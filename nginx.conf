worker_processes auto;
events { worker_connections 4096; }

http {
    upstream backend_api {
        # round-robin across backend replicas
        least_conn;
        server backend:8000;
    }

    # Sticky upstream for WebSockets via IP hash so a client always lands on
    # the same backend replica (Redis pub/sub still fans out events to all
    # replicas, so any replica can serve any bot's WS — sticky just keeps
    # one TCP connection alive).
    upstream backend_ws {
        ip_hash;
        server backend:8000;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        client_max_body_size 50m;

        # WebSocket
        location /ws/ {
            proxy_pass http://backend_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Webhook (Meta -> us). Must be fast; backend just queues.
        location /webhook/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://backend_api;
        }
    }
}
